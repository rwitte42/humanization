<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Humanization Studio</title>
    <link rel="stylesheet" href="styles.css?v=20260527-0725" />
  </head>
  <body>
    <main class="shell">
      <section class="workbench" aria-label="Humanization analysis workspace">
        <div class="editor-pane">
          <header class="masthead">
            <div>
              <p class="eyebrow">AI Authorship Analysis</p>
              <h1>Humanization Studio</h1>
            </div>
            <div class="header-tools">
              <button
                class="icon-button"
                type="button"
                id="themeToggle"
                aria-label="Toggle dark mode"
                title="Toggle dark mode"
              >
                <span id="themeIcon">◐</span>
              </button>
              <button
                class="icon-button"
                type="button"
                id="settingsToggle"
                aria-label="Open settings"
                aria-expanded="false"
                aria-controls="settingsMenu"
                title="Settings"
              >
                <svg class="settings-gear" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 8.35a3.65 3.65 0 1 0 0 7.3 3.65 3.65 0 0 0 0-7.3Z" />
                  <path d="M19.05 13.38c.06-.45.06-.91 0-1.36l2.02-1.55-1.92-3.33-2.38.96a8.1 8.1 0 0 0-1.17-.68L15.25 4h-6.5L8.4 7.42c-.41.19-.8.42-1.17.68l-2.38-.96-1.92 3.33 2.02 1.55a7.1 7.1 0 0 0 0 1.36l-2.02 1.55 1.92 3.33 2.38-.96c.37.26.76.49 1.17.68L8.75 21h6.5l.35-3.02c.41-.19.8-.42 1.17-.68l2.38.96 1.92-3.33-2.02-1.55Z" />
                </svg>
              </button>
              <div class="settings-menu" id="settingsMenu" hidden>
                <div class="settings-heading">
                  <strong>Settings</strong>
                  <span id="configStatus">Checking API setup...</span>
                </div>
                <label class="model-control">
                  <span>Model</span>
                  <select id="modelSelect" name="model">
                    <option value="">Loading models...</option>
                  </select>
                </label>
              </div>
            </div>
          </header>

          <form id="analysisForm" class="analysis-form">
            <div class="control-row" role="group" aria-label="Analysis mode">
              <label class="segmented">
                <input type="radio" name="mode" value="reviewer" checked />
                <span>Reviewer</span>
              </label>
              <label class="segmented">
                <input type="radio" name="mode" value="author" />
                <span>Author</span>
              </label>
            </div>

            <div class="context-grid">
              <label>
                <span>Genre</span>
                <input
                  name="genre"
                  type="text"
                  placeholder="essay, LinkedIn post, policy memo..."
                />
              </label>
              <label>
                <span>Audience</span>
                <input
                  name="audience"
                  type="text"
                  placeholder="reviewer, customer, executive team..."
                />
              </label>
            </div>

            <section class="source-workspace" aria-label="Content source">
              <div class="source-tabs" role="group" aria-label="Choose content source">
                <label class="source-tab">
                  <input type="radio" name="source" value="paste" checked />
                  <span>Paste</span>
                </label>
                <label class="source-tab">
                  <input type="radio" name="source" value="file" />
                  <span>Upload</span>
                </label>
                <label class="source-tab">
                  <input type="radio" name="source" value="url" />
                  <span>URL</span>
                </label>
              </div>

              <div class="source-panel active" data-source-panel="paste">
                <label class="sample-field">
                  <span>Text sample</span>
                  <textarea
                    id="textSample"
                    name="text"
                    rows="18"
                    placeholder="Paste the draft or sample you want assessed..."
                  ></textarea>
                </label>
              </div>

              <div class="source-panel" data-source-panel="file">
                <label class="file-drop" for="fileInput">
                  <strong>Drop in a readable document</strong>
                  <span>Text, Markdown, HTML, CSV, JSON, and RTF files are imported locally in your browser.</span>
                </label>
                <input
                  id="fileInput"
                  type="file"
                  accept=".txt,.md,.markdown,.html,.htm,.csv,.json,.rtf,text/*"
                />
              </div>

              <div class="source-panel" data-source-panel="url">
                <label>
                  <span>Source URL</span>
                  <div class="url-row">
                    <input
                      id="urlInput"
                      type="url"
                      placeholder="https://example.com/article"
                    />
                    <button class="secondary" type="button" id="fetchUrlButton">
                      <span>Import</span>
                    </button>
                  </div>
                </label>
              </div>

              <div class="source-meta" id="sourceMeta">Manual paste</div>
            </section>

            <div class="sample-stats" aria-live="polite">
              <span id="wordCount">0 words</span>
              <span id="charCount">0 characters</span>
              <span id="signalDepth">Needs more signal</span>
            </div>

            <div class="actions">
              <button class="primary" type="submit" id="submitButton">
                <span id="submitLabel">Build reviewer memo</span>
              </button>
              <button class="secondary" type="button" id="clearButton">
                <span>Clear</span>
              </button>
            </div>
          </form>
        </div>

        <aside class="results-pane" aria-label="Analysis results">
          <div class="result-header">
            <div>
              <p class="eyebrow">Assessment</p>
              <h2 id="resultTitle">Ready when you are</h2>
            </div>
            <div class="result-tools">
              <button class="secondary compact" type="button" id="copyResultButton" hidden>
                <span>Copy</span>
              </button>
              <span class="model-pill" id="modelPill">Model pending</span>
            </div>
          </div>
          <div class="result-output" id="resultOutput">
            <div class="empty-state">
              <span class="empty-mark">H</span>
              <p>Paste a sample, choose a lens, then run the analysis.</p>
            </div>
          </div>
        </aside>
      </section>
    </main>
    <script src="app.js?v=20260527-0725" type="module"></script>
  </body>
</html>
